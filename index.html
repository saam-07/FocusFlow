<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FocusFlow | Mood</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" style="color: var(--primary-lavender);">Mood</a>
        <a href="tasks.html">Tasks</a>
        <a href="planner.html">Planner</a>
        <a href="pomodoro.html">Focus</a>
    </nav>
    <div class="container">
        <div class="card">
            <h1>Daily Check-in ⚡</h1>
            
            <label>Current Energy:</label>
            <select id="energyLevel">
                <option value="1">😵 Low - I'm exhausted</option>
                <option value="2" selected>😐 Medium - I'm okay</option>
                <option value="3">🔥 High - Let's go!</option>
            </select>

            <div style="display: flex; gap: 20px; margin-top: 15px;">
                <div style="flex: 1;">
                    <label>Class Starts:</label>
                    <input type="time" id="classStart" value="09:00">
                </div>
                <div style="flex: 1;">
                    <label>Class Ends:</label>
                    <input type="time" id="classEnd" value="15:00">
                </div>
            </div>

            <label>Sleep Hours (to block out):</label>
            <input type="number" id="sleepHours" value="8" min="4" max="12">

            <button onclick="saveMoodAndGo()">Analyze My Day →</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
