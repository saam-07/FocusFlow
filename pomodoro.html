<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FocusFlow | Pomodoro</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .timer-display {
            font-size: 6rem;
            font-weight: bold;
            margin: 20px 0;
            color: var(--primary-lavender);
        }
        .timer-controls button {
            width: auto;
            margin: 5px;
            padding: 10px 30px;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html">Mood</a>
        <a href="tasks.html">Tasks</a>
        <a href="planner.html">Planner</a>
        <a href="pomodoro.html">Focus</a>
    </nav>
    <div class="container" style="text-align: center;">
        <div class="card">
            <h2>Focus Session 🔥</h2>
            <div id="timer" class="timer-display">25:00</div>
            <div class="timer-controls">
                <button onclick="startTimer()">Start</button>
                <button onclick="pauseTimer()" style="background:#444; color:white;">Pause</button>
                <button onclick="resetTimer()" style="background:#ff5555; color:white;">Reset</button>
            </div>
            <p id="timerMsg" style="margin-top:20px; opacity:0.7;">Stay focused for 25 minutes.</p>
        </div>
    </div>

    <script>
        let timeLeft = 25 * 60;
        let timerInterval;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60);
            const secs = timeLeft % 60;
            document.getElementById('timer').textContent = 
                `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function startTimer() {
            if (timerInterval) return;
            timerInterval = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    clearInterval(timerInterval);
                    alert("Time's up! Take a break.");
                }
            }, 1000);
        }

        function pauseTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
        }

        function resetTimer() {
            pauseTimer();
            timeLeft = 25 * 60;
            updateDisplay();
        }
    </script>
</body>
</html>
